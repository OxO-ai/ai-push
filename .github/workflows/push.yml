name: AI Push

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,8,13 * * *'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python ai_push.py
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          BARK_URL: ${{ secrets.BARK_URL }}
